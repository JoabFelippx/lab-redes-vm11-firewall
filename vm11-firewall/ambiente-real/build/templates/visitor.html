<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VM11 — Firewall Manager (Visitante)</title>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --accent:   #58a6ff;
    --success:  #3fb950;
    --danger:   #f85149;
    --warn:     #d29922;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --mono:     'JetBrains Mono', 'Fira Code', monospace;
    --sans:     'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: .75rem;
    font-size: .95rem;
    font-weight: 600;
    letter-spacing: .02em;
  }
  .badge-visitor-mode {
    background: rgba(210, 153, 34, 0.15);
    color: var(--warn);
    border: 1px solid rgba(210, 153, 34, 0.3);
    padding: .2rem .6rem;
    border-radius: 20px;
    font-size: .75rem;
    font-weight: 600;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .status-dot.ok  { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.err { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }
  .status-label { font-size: .8rem; color: var(--muted); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  aside h2 {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
  }
  .vlan-list { display: flex; flex-direction: column; gap: .5rem; }
  .vlan-chip {
    display: flex;
    align-items: center;
    gap: .6rem;
    padding: .5rem .75rem;
    border-radius: 6px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    font-size: .85rem;
  }
  .vlan-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .vlan-name { font-weight: 600; }
  .vlan-sub  { color: var(--muted); font-size: .75rem; margin-left: auto; font-family: var(--mono); }

  /* ── MAIN ── */
  main { padding: 2rem; display: flex; flex-direction: column; gap: 2rem; overflow-x: hidden; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-title { font-size: 1.1rem; font-weight: 600; }
  .section-sub   { font-size: .8rem; color: var(--muted); margin-top: .15rem; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  /* ── BUTTONS ── */
  .btn {
    padding: .5rem 1.25rem;
    border-radius: 6px;
    border: none;
    font-size: .875rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    font-family: var(--sans);
  }
  .btn:active { transform: scale(.97); }
  .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-sm { padding: .3rem .75rem; font-size: .8rem; }

  /* ── RULE TABLE ── */
  .rule-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  .rule-table th {
    text-align: left;
    padding: .6rem 1rem;
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .rule-table td {
    padding: .75rem 1rem;
    border-bottom: 1px solid rgba(48,54,61,.5);
    vertical-align: middle;
  }
  .rule-table tr:last-child td { border-bottom: none; }
  .rule-table tr:hover td { background: rgba(255,255,255,.02); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: .3rem;
    padding: .2rem .55rem;
    border-radius: 4px;
    font-size: .75rem;
    font-weight: 500;
  }
  .badge-accept { background: rgba(63,185,80,.15);  color: var(--success); }
  .badge-drop   { background: rgba(248,81,73,.15);  color: var(--danger); }
  .badge-system { background: rgba(88,166,255,.12); color: var(--accent); }

  .rule-raw {
    font-family: var(--mono);
    font-size: .78rem;
    color: var(--muted);
    background: rgba(0,0,0,.3);
    padding: .2rem .5rem;
    border-radius: 4px;
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .counter { font-family: var(--mono); font-size: .78rem; color: var(--muted); }

  /* ── RAW PANEL ── */
  pre.raw-nft {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    font-family: var(--mono);
    font-size: .8rem;
    color: #a5d6ff;
    overflow-x: auto;
    white-space: pre;
    line-height: 1.6;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: .9rem;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span>VM11 Firewall Manager</span>
    <span class="badge-visitor-mode">Modo Visitante</span>
  </div>
  <div style="display:flex;align-items:center;gap:.5rem;">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">verificando…</span>
  </div>
</header>

<div class="layout">
  <aside>
    <div>
      <h2>VLANs</h2>
      <div class="vlan-list" id="vlan-list">
        <div style="color:var(--muted);font-size:.85rem">carregando…</div>
      </div>
    </div>
    <div>
      <h2>Ações rápidas</h2>
      <div style="display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem;">
        <button class="btn btn-ghost" style="text-align:left;width:100%"
          onclick="loadRaw()">
          📄 Ver ruleset completo
        </button>
        <button class="btn btn-ghost" style="text-align:left;width:100%"
          onclick="loadRules()">
          🔄 Recarregar regras
        </button>
      </div>
    </div>
  </aside>

  <main>
    <section>
      <div class="section-header">
        <div>
          <div class="section-title">Regras ativas</div>
          <div class="section-sub" id="rules-count">—</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="loadRules()">🔄 Atualizar</button>
      </div>

      <div class="card">
        <div id="rules-container">
          <div class="empty">Carregando regras…</div>
        </div>
      </div>
    </section>

    <section id="raw-section" style="display:none">
      <div class="section-header">
        <div class="section-title">Ruleset completo (nft list ruleset)</div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('raw-section').style.display='none'">✕ Fechar</button>
      </div>
      <pre class="raw-nft" id="raw-content">…</pre>
    </section>
  </main>
</div>

<script>
// ──────────────────────────────────────────────
// Estado
// ──────────────────────────────────────────────
let vlans = {};

// ──────────────────────────────────────────────
// Status
// ──────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch("/api/status");
    const d = await r.json();
    const dot = document.getElementById("status-dot");
    const lbl = document.getElementById("status-label");
    if (d.nft_available) {
      dot.className = "status-dot ok";
      lbl.textContent = `nftables OK · ${d.total_rules} regras`;
    } else {
      dot.className = "status-dot err";
      lbl.textContent = "nftables indisponível";
    }
  } catch {
    document.getElementById("status-dot").className = "status-dot err";
    document.getElementById("status-label").textContent = "sem conexão";
  }
}

// ──────────────────────────────────────────────
// VLANs
// ──────────────────────────────────────────────
async function loadVlans() {
  const r = await fetch("/api/vlans");
  vlans = await r.json();

  const list = document.getElementById("vlan-list");
  list.innerHTML = "";
  for (const [name, data] of Object.entries(vlans)) {
    const chip = document.createElement("div");
    chip.className = "vlan-chip";
    chip.innerHTML = `
      <span class="vlan-dot" style="background:${data.cor}"></span>
      <span class="vlan-name">VLAN ${data.vlan}</span>
      <span>${name}</span>
      <span class="vlan-sub">${data.subnet}</span>
    `;
    list.appendChild(chip);
  }
}

// ──────────────────────────────────────────────
// Regras
// ──────────────────────────────────────────────
async function loadRules() {
  const container = document.getElementById("rules-container");
  container.innerHTML = `<div class="empty">Carregando…</div>`;

  const r = await fetch("/api/rules");
  const d = await r.json();

  if (!d.ok || d.rules.length === 0) {
    container.innerHTML = `<div class="empty">Nenhuma regra encontrada.<br>Verifique se o nftables está rodando.</div>`;
    document.getElementById("rules-count").textContent = "0 regras";
    return;
  }

  document.getElementById("rules-count").textContent = `${d.rules.length} regra(s) carregada(s)`;

  const table = document.createElement("table");
  table.className = "rule-table";
  table.innerHTML = `
    <thead>
      <tr>
        <th>Handle</th>
        <th>Descrição</th>
        <th>Regra (raw)</th>
        <th>Pacotes</th>
        <th>Status</th>
      </tr>
    </thead>
  `;
  const tbody = document.createElement("tbody");

  for (const rule of d.rules) {
    const tr = document.createElement("tr");

    let badge = "";
    if (rule.raw.includes("accept"))     badge = `<span class="badge badge-accept">✅ ACEITAR</span>`;
    else if (rule.raw.includes("drop"))  badge = `<span class="badge badge-drop">❌ DROP</span>`;
    else if (rule.raw.includes("policy")) badge = `<span class="badge badge-system">⚙ POLICY</span>`;
    else                                  badge = `<span class="badge badge-system">ℹ INFO</span>`;

    const counter = rule.packets !== null
      ? `${rule.packets.toLocaleString()} pkts`
      : "—";

    tr.innerHTML = `
      <td><code style="font-family:var(--mono);font-size:.8rem;color:var(--muted)">${rule.handle ?? "—"}</code></td>
      <td style="min-width:220px">${badge} <span style="margin-left:.4rem;font-size:.82rem">${rule.comment}</span></td>
      <td><div class="rule-raw" title="${rule.raw}">${rule.raw}</div></td>
      <td><span class="counter">${counter}</span></td>
      <td><span style="font-size:.75rem;color:var(--muted)">Visualização</span></td>
    `;
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  container.innerHTML = "";
  container.appendChild(table);
}

// ──────────────────────────────────────────────
// Raw ruleset
// ──────────────────────────────────────────────
async function loadRaw() {
  const sec = document.getElementById("raw-section");
  sec.style.display = "block";
  document.getElementById("raw-content").textContent = "Carregando…";
  sec.scrollIntoView({behavior:"smooth"});
  const r = await fetch("/api/raw");
  const d = await r.json();
  document.getElementById("raw-content").textContent = d.ok ? d.raw : "nft indisponível";
}

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
(async () => {
  await loadVlans();
  await loadRules();
  await checkStatus();
  setInterval(checkStatus, 10000);
})();
</script>
</body>
</html>
