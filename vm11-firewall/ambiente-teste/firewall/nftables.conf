#!/usr/sbin/nft -f

flush ruleset

table inet filter {

    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept

        ip protocol icmp accept

        # USERS -> SERVER
        ip saddr 172.16.60.0/24 ip daddr 172.16.20.0/24 tcp dport {80,443} counter accept

        # USERS -> MGMT
        ip saddr 172.16.60.0/24 ip daddr 172.16.10.0/24 counter log prefix "DROP_USERS_MGMT: " drop

        # DMZ -> SERVER
        ip saddr 172.16.30.0/24 ip daddr 172.16.20.0/24 tcp dport 443 counter accept

        # MONITOR -> NETDEV
        ip saddr 172.16.40.0/24 ip daddr 172.16.50.0/24 udp dport 161 counter accept

        # MGMT -> SERVER
        ip saddr 172.16.10.0/24 ip daddr 172.16.20.0/24 tcp dport 22 counter accept

        counter log prefix "DROP_DEFAULT: " drop
    }

    chain input {
        type filter hook input priority 0; policy accept;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
